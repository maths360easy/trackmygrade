<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Progress Tracker</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
   <link rel="stylesheet" th:href="@{/style.css}">

</head>
<body class="d-flex flex-column min-vh-100">

  <!-- Header with Navbar -->
  <header class="header-custom">
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">

        <!-- Logo + App Name -->
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img th:src="@{/images/logo1.jpg}" width="80" height="80" class="me-2">
      
          TrackMyGrades
        </a>

        <!-- Mobile toggle button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText">
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar links -->
        <div class="collapse navbar-collapse" id="navbarText">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Logins</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Special Offers</a></li>
          </ul>
          <span class="navbar-text text-white">TrackerMyGrade App</span>
        </div>
      </div>
    </nav>

    <!-- Header title under navbar -->
    <div class="text-center text-white py-3">
        <h1> TrackMyGrades</h1>
      <h1>Student Progress App</h1>
      <p>Learn • Track • Improve</p>
    </div>
  </header>





<h2>Students</h2>

<form action="/students/save" method="post">
    <input name="name" placeholder="Name" required>
    <input name="course" placeholder="Course" required>
    <button>Add</button>
</form>

<table class="table mt-3">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Course</th>
        <th>Action</th>
    </tr>

    <tr th:each="student : ${students}">
        <td th:text="${student.id}"></td>
        <td th:text="${student.name}"></td>
        <td th:text="${student.course}"></td>
        <td>
            <a th:href="@{/students/delete/{id}(id=${student.id})}">Delete</a>
        </td>
    </tr>
</table>



<footer class="footer mt-auto text-center py-4 footer-custom">
    <p><strong>Contact Us</strong></p>
    <p>123 Learning Street, Knowledge City</p>
    <p>Phone: +123 456 7890 | Email: info@studentprogress.com</p>
</footer>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
