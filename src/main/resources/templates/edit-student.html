<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Add Student</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body class="d-flex flex-column min-vh-100">

<!-- HEADER + NAVBAR -->
<header class="header-custom">
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center" href="#">
         <img th:src="@{/images/logo1.jpg}" width="80" height="80" class="me-2">
          TrackMyGrades
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarText">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link active" th:href="@{/home}">Home</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/admin-login}">login</a></li>

          </ul>
          <span class="navbar-text text-white">TrackMyGrade App</span>
        </div>
      </div>
    </nav>

    <div class="text-center text-white py-3">
      <h1>TrackMyGrades</h1>
      <h2>Student Progress App</h2>
      <p>Learn • Track • Improve</p>
    </div>
</header>

<body>

<div class="container mt-4">

    <h2 class="mb-4">Edit Student</h2>

    <form th:action="@{/admin/update-student}" th:object="${student}" method="post">

        <input type="hidden" th:field="*{studentId}" />

        <div class="mb-3">
            <label class="form-label">Name:</label>
            <input type="text" class="form-control" th:field="*{name}">
        </div>

        <div class="mb-3">
            <label class="form-label">Email:</label>
            <input type="email" class="form-control" th:field="*{email}">
        </div>

        <div class="mb-3">
            <label class="form-label">Password:</label>
            <input type="text" class="form-control" th:field="*{password}">
        </div>

        <div class="mb-3">
            <label class="form-label">Fees Paid:</label>
            <input type="number" class="form-control" th:field="*{feesPaid}">
        </div>

        <div class="mb-3">
            <label class="form-label">Subject:</label>

                <select class="form-select" th:field="*{course.id}">
                <option th:each="c : ${subjects}"
                th:value="${c.id}"
                th:text="${c.subjectName}">
                </option>
                </select>
        </div>

        <button type="submit" class="btn btn-primary">Update</button>
           <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Back</a>

    </form>

</div>



<!-- FOOTER -->
<footer class="footer mt-auto text-center py-4 footer-custom">
    <p><strong>Contact Us</strong></p>
    <p>123 Learning Street, Knowledge City</p>
    <p>Phone: +123 456 7890 | Email: info@studentprogress.com</p>

    
    <hr style="width: 60%; margin: 20px auto;">

    <p class="text-muted" style="font-size: 0.9rem;">
        © 2026 TrackMyGrades. All rights reserved.
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
