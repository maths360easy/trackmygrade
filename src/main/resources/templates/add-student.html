<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Add Student</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body class="d-flex flex-column min-vh-100">

<!-- HEADER + NAVBAR -->
<header class="header-custom">
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center" href="#">
         <img th:src="@{/images/logo1.jpg}" width="80" height="80" class="me-2">
          TrackMyGrades
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarText">
          <ul class="navbar-nav me-auto">

            <li class="nav-item"><a class="nav-link active" th:href="@{/home}">Home</a></li>
        
            <li class="nav-item"><a class="nav-link" href="#">Special Offers</a></li>
          </ul>
          <span class="navbar-text text-white">TrackMyGrade App</span>
        </div>
      </div>
    </nav>

    <div class="text-center text-white py-3">


      <h1> TrackMyGrades</h1>
      <h2>Student Progress App</h2>
      <p>Learn • Track • Improve</p>
    
    </div>
</header>

<!-- PAGE CONTENT -->
<div class="container mt-5 flex-grow-1">

    <h3 class="mb-4">Add Student</h3>

    <form th:action="@{/admin/save-student}" th:object="${student}" method="post" class="p-4 border rounded bg-white">

        <input type="hidden" th:field="*{studentId}">

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input th:field="*{name}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input th:field="*{email}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input th:field="*{password}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Select Subject</label>
            <select th:field="*{course.id}" class="form-select" required>
                <option value="">--Choose Subject--</option>
                <option th:each="c : ${courses}"
                        th:value="${c.id}"
                        th:text="${c.subjectName}">
                </option>
            </select>
        </div>


            <div class="mb-3">
                    <label for="fee">Select fee:</label>
                     <input th:field="*{feesPaid}" class="form-control">
                    <select name="fee" id="fee" class="form-control">
                        <option value="">--Choose fee--</option>
                        <option value="1">LC Maths --550 </option>
                        <option value="2">LC Physics--520</option>
                        <option value="3">LC Chemistry--530</option>
                        <option value="4">LC Biology-- 500</option>
                        <option value="5">LC English--480</option>
                        <option value="6">LC Accounting--510</option>
                        <option value="7">JC Maths--420</option>
                        <option value="8">JC English--400</option>
                        <option value="9">JC Science--430</option>
                        <option value="10">JC Irish--410</option>
                    </select>
             
            </div>

        

        <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-success">Save</button>
            <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Back</a>
        </div>

    </form>

</div>

<!-- FOOTER -->
<footer class="footer mt-auto text-center py-4 footer-custom">
    <p><strong>Contact Us</strong></p>
    <p>123 Learning Street, Knowledge City</p>
    <p>Phone: +123 456 7890 | Email: info@studentprogress.com</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
