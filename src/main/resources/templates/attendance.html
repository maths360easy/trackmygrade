<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Progress Tracker</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body class="d-flex flex-column min-vh-100">

<header class="header-custom">
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center" href="#">
         <img th:src="@{/images/logo1.jpg}" width="80" height="80" class="me-2">
          TrackMyGrades
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarText">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Logins</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Special Offers</a></li>
          </ul>
          <span class="navbar-text text-white">TrackMyGrade App</span>
        </div>
      </div>
    </nav>

    <div class="text-center text-white py-3">

       
      <h1>TrackMyGrades</h1>
       <h2>Student Progress App</h2>
      <p>Learn • Track • Improve</p>
    </div>
</header>

<!-- FIXED: replaced second <body> with <div> -->
<div class="bg-light flex-grow-1">

<div class="container mt-4">

    <h3 class="mb-3">Add Attendance</h3>

    <form th:action="@{/admin/save-attendance}" th:object="${attendance}" method="post" class="p-3 border rounded bg-white">

        <!-- STUDENT DROPDOWN -->
        <div class="mb-3">
            <label class="form-label">Student</label>
            <select th:field="*{student}" class="form-select">
                <option th:each="s : ${students}"
                        th:value="${s.studentId}"
                        th:text="${s.name}">
                </option>
            </select>
        </div>

        <!-- SUBJECT DROPDOWN -->
        <div class="mb-3">
            <label class="form-label">Subject</label>
            <select th:field="*{subject}" class="form-select">
                <option th:each="subj : ${subjects}"
                        th:value="${subj.id}"
                        th:text="${subj.subjectName}">
                </option>
            </select>
        </div>

        <!-- ATTENDANCE MONTH -->
        <div class="mb-3">
            <label class="form-label">Attendance Month</label>
            <input type="text" th:field="*{amonth}" class="form-control" placeholder="e.g., January">
        </div>

        <!-- ATTENDANCE PERCENT -->
        <div class="mb-3">
            <label class="form-label">Attendance %</label>
            <input type="number" th:field="*{attendancePercent}" class="form-control" min="0" max="100">
        </div>

        <button class="btn btn-success">Save Attendance</button>

    </form>

    <div class="mt-3">
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Back to Dashboard</a>
    </div>

</div>

</div> <!-- END FIXED DIV -->

<footer class="footer mt-auto text-center py-4 footer-custom">
    <p><strong>Contact Us</strong></p>
    <p>123 Learning Street, Knowledge City</p>
    <p>Phone: +123 456 7890 | Email: info@studentprogress.com</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
