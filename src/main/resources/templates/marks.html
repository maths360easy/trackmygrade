<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Progress Tracker</title>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" th:href="@{/style.css}">
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- Header with Navbar -->
  <header class="header-custom">
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">

        <!-- Logo + App Name -->
        <a class="navbar-brand d-flex align-items-center" href="#">
         <img th:src="@{/images/logo1.jpg}" width="80" height="80" class="me-2">
       
          TrackMyGrades
        </a>

        <!-- Mobile toggle button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText">
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar links -->
        <div class="collapse navbar-collapse" id="navbarText">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link active" th:href="@{/home}">Home</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/admin/login}">login</a></li>

            
          </ul>
          <span class="navbar-text text-white">TrackMyGrade App</span>
        </div>
      </div>
    </nav>

    <!-- Header title under navbar -->
    <div class="text-center text-white py-3">
        <h1> TrackMyGrades</h1>
      <h2>Student Progress App</h2>
      <p>Learn • Track • Improve</p>
    </div>
  </header>




<body class="bg-light">


<div class="card shadow p-4 mb-4">
    <h5 class="mb-3">Enter Marks</h5>

    <form th:action="@{/admin/save-marks}" th:object="${marks}" method="post">

        <!-- STUDENT -->
        <div class="mb-3">
            <label class="form-label">Student</label>
            <select th:field="*{student}" class="form-select">
                <option value="">--Choose Student--</option>
                <option th:each="s : ${students}"
                        th:value="${s.studentId}"
                        th:text="${s.name}">
                </option>
            </select>
        </div>

        <!-- SUBJECT -->
        <div class="mb-3">
            <label class="form-label">Subject</label>
            <select th:field="*{subject}" class="form-select">
                <option value="">--Choose Subject--</option>
                <option th:each="subj : ${subjects}"
                        th:value="${subj.id}"
                        th:text="${subj.subjectName}">
                </option>
            </select>
        </div>

        <!-- TEST MONTH -->
        <div class="mb-3">
            <label class="form-label">Test Month</label>
            <input type="text" th:field="*{testMonth}" class="form-control" placeholder="Enter Test Month">
        </div>

        <!-- MARKS -->
        <div class="mb-3">
            <label class="form-label">Marks</label>
            <input type="number" th:field="*{marks}" class="form-control" placeholder="Enter Marks">
        </div>

        <button class="btn btn-primary">Save Marks</button>
    </form>
</div>
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Back to Dashboard</a>
    </div>

</div>
<footer class="footer mt-auto text-center py-4 footer-custom">
    <p><strong>Contact Us</strong></p>
    <p>123 Learning Street, Knowledge City</p>
    <p>Phone: +123 456 7890 | Email: info@studentprogress.com</p>


    
    <hr style="width: 60%; margin: 20px auto;">

    <p class="text-muted" style="font-size: 0.9rem;">
        © 2026 TrackMyGrades. All rights reserved.
    </p>
</footer>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>>
